<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shape Quest</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-root">
      <header class="game-header">
        <h1>Shape Quest</h1>
        <p class="game-instruction">
          Find and click the glowing shape to advance. Everything is big and high‑contrast on purpose.
        </p>
        <button id="bigger-text" class="control-button">Bigger Text</button>
        <button id="smaller-text" class="control-button">Smaller Text</button>
      </header>

      <section class="game-status" aria-live="polite">
        <div id="level-label" class="status-line">Level 1 of 5</div>
        <div id="message" class="status-line">Click the glowing shape.</div>
      </section>

      <section class="game-board" aria-label="Shape game board">
        <!-- Tiles are generated by JavaScript -->
      </section>

      <section class="game-footer">
        <button id="reset-game" class="control-button secondary">Restart Game</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
